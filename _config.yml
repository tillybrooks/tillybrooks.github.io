title: "Tilden \"Tilly\" Brooks"
email: teb44@stanford.edu
description: >
  Ph.D. student in Linguistics at Stanford and J.D. candidate at Yale Law School.
  Researcher at the intersection of linguistics and law.

remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "air"

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-sitemap

# Author profile (shown in sidebar)
author:
  name: "Tilden \"Tilly\" Brooks"
  avatar: "/assets/img/TB_headshot copy.jpg"
  bio: "Ph.D. student in Linguistics at Stanford & J.D. candidate at Yale Law School. I study the intersection of linguistics and law."
  location: "Stanford, CA / New Haven, CT"
  email: "teb44@stanford.edu"
  links:
    - label: "CV"
      icon: "fas fa-fw fa-file-pdf"
      url: "/CV/"

# Default front matter
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      show_date: true

# Site settings
baseurl: ""
url: "https://tillybrooks.github.io"
repository: "tillybrooks/tillybrooks.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty
timezone: America/Los_Angeles

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
